sudo: false
language: python
stages:
- test
- deploy
python:
  - '3.6'
install:
  - pip install --upgrade --pre tox
jobs:
  include:

    - python: '3.6'
      env: linting
      install:
      - pip install pre-commit
      - pre-commit install-hooks
      script:
      - pre-commit run --all-files


    # note: please use "tox --listenvs" to populate the build matrix below
    # please remove the linting env in all cases

    - env: TOXENV=pypy
      python: 'pypy-5.4'
    - env: TOXENV=py36-pluggymaster
    - env: TOXENV=py27-pluggymaster
    - env: TOXENV=py37
      python: 'nightly'
    - env: TOXENV=py36
    - env: TOXENV=py35-freeze
      python: '3.5'
    - env: TOXENV=py35
      python: '3.5'
    - env: TOXENV=py34
    - env: TOXENV=py27

     # coveralls is not listed in tox's envlist, but should run in travis
    - env: TOXENV=coveralls

    - env: TOXENV=py27-xdist
    - env: TOXENV=py36-xdist
    - env: TOXENV=py27-nobyte
    - env: TOXENV=py27-pexpect
    - env: TOXENV=py36-pexpect
    - env: TOXENV=docs
    - env: TOXENV=py27-trial
    - env: TOXENV=py36-trial

    - env: TOXENV=py36-numpy
    - env: TOXENV=py27-numpy
    - env: TOXENV=doctesting

    - stage: deploy
      python: '3.6'
      env:
      install: pip install -U setuptools setuptools_scm
      script: skip
      deploy:
        provider: pypi
        user: nicoddemus
        distributions: sdist bdist_wheel
        skip_upload_docs: true
        password:
          secure: 
        on:
          tags: true
          repo: pytest-dev/pytest

script: tox --recreate

cache:
    directories:
        - $HOME/.cache/pip
        - $HOME/.cache/pre-commit
